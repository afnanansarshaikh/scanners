<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Giveaway Scanner</title>
  <style>
    :root{--bg:#f6f8fb;--card:#fff;--accent:#1976d2;--ok:#2e7d32;--warn:#f0ad4e;--err:#c62828;--muted:#6b7280;--text:#111;--border:#e5e7eb;--shadow:0 4px 24px rgba(0,0,0,0.08);}
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
    html,body{height:100%;background:var(--bg);color:var(--text);font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Arial,sans-serif;}
    #flashScreen{position:fixed;inset:0;z-index:99998;display:none;pointer-events:none;}
    #flashLabel{position:fixed;inset:0;z-index:99999;display:none;align-items:center;justify-content:center;font-size:clamp(42px,13vw,84px);font-weight:700;color:#fff;text-shadow:0 4px 24px rgba(0,0,0,0.35);pointer-events:none;text-align:center;padding:20px;}
    .wrap{max-width:680px;margin:0 auto;padding:24px 16px 40px;}
    .card{background:var(--card);border-radius:16px;border:1px solid var(--border);padding:24px;box-shadow:var(--shadow);}
    .card-title{font-size:20px;font-weight:700;text-align:center;margin-bottom:20px;}
    input[type=text],input[type=password]{width:100%;padding:13px 14px;margin:5px 0;background:#f9fafb;border:1px solid var(--border);border-radius:10px;font-size:16px;color:var(--text);font-family:inherit;transition:border-color 0.2s;}
    input:focus{outline:none;border-color:var(--accent);background:#fff;}
    #scannerContainer{position:relative;border-radius:12px;overflow:hidden;background:#000;height:320px;max-height:52vh;margin-top:14px;}
    #video{width:100%;height:100%;display:block;object-fit:cover;}
    #resultOverlay{position:absolute;left:50%;transform:translateX(-50%);top:12px;z-index:1000;min-width:200px;padding:10px 18px;border-radius:10px;color:#fff;font-weight:800;text-align:center;box-shadow:0 8px 20px rgba(0,0,0,0.25);display:none;font-size:17px;}
    #resultOverlay.show{display:block;}
    #resultOverlay.ok{background:var(--ok);}
    #resultOverlay.err{background:var(--err);}
    #status{margin-top:12px;font-weight:600;font-size:15px;text-align:center;color:var(--muted);min-height:20px;}
    .controls{margin-top:14px;display:flex;gap:8px;flex-wrap:wrap;justify-content:center;}
    .btn{padding:13px 20px;border-radius:10px;border:none;cursor:pointer;font-weight:700;font-size:15px;font-family:inherit;transition:all 0.18s;min-height:44px;}
    .btn.primary{background:var(--accent);color:#fff;width:100%;}
    .btn.primary:hover{background:#1565c0;}
    .btn.danger{background:var(--err);color:#fff;}
    #loginBox{max-width:380px;margin:0 auto;}
    #scannerBox{display:none;}
    .signin-row{display:flex;align-items:center;justify-content:space-between;margin-bottom:14px;flex-wrap:wrap;gap:8px;}
    .signin-info{font-size:14px;font-weight:600;}.signin-info .name{color:var(--accent);}
    .admin-badge{display:inline-block;margin-left:6px;padding:2px 7px;border-radius:6px;background:var(--accent);color:#fff;font-size:10px;font-weight:700;text-transform:uppercase;}
    #loginMsg{font-size:13px;color:var(--err);text-align:center;margin-top:8px;min-height:18px;}
    #diag{margin-top:10px;color:var(--err);font-size:13px;display:none;text-align:center;}
    @media(max-width:600px){
      .wrap{padding:12px 10px 30px;}
      .card{padding:16px 12px;}
      #scannerContainer{height:260px;}
      .signin-info{font-size:13px;}
    }
  </style>
</head>
<body>
<div id="flashScreen"></div>
<div id="flashLabel"></div>
<div class="wrap">
  <div class="card">
    <div class="card-title">🎁 Giveaway Scanner</div>
    <div id="loginBox">
      <input id="staffName" type="text" placeholder="Name" autocomplete="off">
      <input id="staffPin" type="password" placeholder="PIN" autocomplete="off">
      <div class="controls">
        <button class="btn primary" id="loginBtn">Login &amp; Start Scanner</button>
      </div>
      <div id="loginMsg"></div>
    </div>
    <div id="scannerBox">
      <div class="signin-row">
        <div class="signin-info">
          Signed in as <span class="name" id="staffLabel"></span>
          <span id="adminBadge" class="admin-badge" style="display:none">Admin</span>
        </div>
        <button class="btn danger" id="logoutBtn">Logout</button>
      </div>
      <div id="scannerContainer">
        <video id="video" playsinline muted></video>
        <div id="resultOverlay" aria-live="polite"></div>
      </div>
      <div id="status">Ready</div>
      <div id="diag"></div>
    </div>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/jsqr@1.4.0/dist/jsQR.min.js"></script>
<script>
  // ── CONFIGURATION ──────────────────────────────────────────────────────────
  // Paste your MAIN project Apps Script deployment URL here:
  var API_URL = 'https://script.google.com/macros/s/AKfycbxQ2ZqoCn8oB89hHn_3XfzAEovMf6R57QB2IWttH7g9tI4GRWX71QbAA4MnfnnyIVN1/exec';
  // ──────────────────────────────────────────────────────────────────────────

  var video       = document.getElementById('video');
  var overlay     = document.getElementById('resultOverlay');
  var loginBtn    = document.getElementById('loginBtn');
  var logoutBtn   = document.getElementById('logoutBtn');
  var loginMsg    = document.getElementById('loginMsg');
  var staffLblEl  = document.getElementById('staffLabel');
  var adminBadge  = document.getElementById('adminBadge');
  var statusEl    = document.getElementById('status');
  var diag        = document.getElementById('diag');
  var flashScreen = document.getElementById('flashScreen');
  var flashLabel  = document.getElementById('flashLabel');

  var canvas = document.createElement('canvas'), ctx = null;
  var stream = null, scanning = false, isProcessing = false, tickId = null;
  var staffLabel = '', flashTimer = null, _sessionPoll = null;
  var staffSessionId = null, isAdmin = false;

  function api(action, params) {
    return fetch(API_URL, {
      method: 'POST',
      headers: { 'Content-Type': 'text/plain' },
      body: JSON.stringify(Object.assign({ action: action }, params))
    }).then(function(r){ return r.json(); });
  }

  function flash(color, label) {
    if (flashTimer) clearTimeout(flashTimer);
    flashScreen.style.background = color; flashScreen.style.display = 'block';
    flashLabel.textContent = label; flashLabel.style.display = 'flex';
    flashTimer = setTimeout(function(){ flashScreen.style.display='none'; flashLabel.style.display='none'; flashTimer=null; }, 1000);
  }

  function showOverlay(text, cls) {
    overlay.className = cls + ' show'; overlay.textContent = text;
    setTimeout(function(){ overlay.className=''; overlay.textContent=''; }, 1600);
  }

  loginBtn.addEventListener('click', function() {
    var name = document.getElementById('staffName').value.trim();
    var pin  = document.getElementById('staffPin').value.trim();
    if (!name || !pin) { loginMsg.textContent = 'Enter name and PIN'; return; }
    loginBtn.disabled = true;
    loginMsg.textContent = 'Checking credentials...';
    api('login', { name: name, pin: pin, page: 'giveawayscanner' })
      .then(function(res) {
        loginBtn.disabled = false;
        if (!res || !res.ok) { loginMsg.textContent = res && res.message ? res.message : 'Invalid name or PIN'; return; }
        staffLabel = res.label || name; staffSessionId = res.sessionId || null; isAdmin = !!res.isAdmin;
        staffLblEl.textContent = staffLabel;
        adminBadge.style.display = isAdmin ? 'inline-block' : 'none';
        document.getElementById('loginBox').style.display = 'none';
        document.getElementById('scannerBox').style.display = 'block';
        document.getElementById('staffName').value = '';
        document.getElementById('staffPin').value = '';
        loginMsg.textContent = '';
        startCamera();
        if (!isAdmin) startSessionPoll();
      })
      .catch(function() { loginBtn.disabled = false; loginMsg.textContent = 'Connection error. Try again.'; });
  });

  function startCamera() {
    navigator.mediaDevices.getUserMedia({ video: { facingMode: 'environment' } })
      .then(function(s) {
        stream = s; video.srcObject = stream;
        video.setAttribute('playsinline', true); video.muted = true;
        return video.play();
      })
      .then(function() {
        scanning = true; statusEl.textContent = 'Point camera at the ticket QR code';
        try { canvas = document.createElement('canvas'); ctx = canvas.getContext('2d', { willReadFrequently: true }); } catch(e){}
        canvas.width = video.videoWidth || 640; canvas.height = video.videoHeight || 480;
        if (!tickId) tickId = requestAnimationFrame(tick);
      })
      .catch(function(e) {
        statusEl.textContent = 'Camera error: ' + (e && e.message ? e.message : e);
        diag.style.display = 'block'; diag.textContent = 'Camera error: ' + (e && e.message ? e.message : e);
      });
  }

  function stopCamera() {
    scanning = false; isProcessing = false;
    if (stream) { try { stream.getTracks().forEach(function(t){ t.stop(); }); } catch(e){} stream = null; }
    try { video.pause(); video.srcObject = null; } catch(e){}
    if (tickId) { cancelAnimationFrame(tickId); tickId = null; }
  }

  function tick() {
    if (!scanning || isProcessing) { if (tickId) { cancelAnimationFrame(tickId); tickId = null; } return; }
    tickId = requestAnimationFrame(tick);
    try {
      if (video.readyState === video.HAVE_ENOUGH_DATA) {
        canvas.width = video.videoWidth; canvas.height = video.videoHeight;
        if (!ctx) { try { ctx = canvas.getContext('2d', { willReadFrequently: true }); } catch(e){} }
        if (!ctx) return;
        ctx.drawImage(video, 0, 0, canvas.width, canvas.height);
        if (typeof jsQR === 'undefined') return;
        var code = jsQR(ctx.getImageData(0, 0, canvas.width, canvas.height).data, canvas.width, canvas.height);
        if (code && code.data) { if (isProcessing) return; isProcessing = true; handleCode(code.data); }
      }
    } catch(e) { isProcessing = false; }
  }

  function resume() {
    setTimeout(function(){ isProcessing = false; if (staffLabel) tickId = requestAnimationFrame(tick); }, 1500);
  }

  function handleCode(data) {
    var serial = data.indexOf('|') !== -1 ? data.split('|')[0] : data;
    statusEl.textContent = 'Checking...';
    api('scan', { payload: data, staffLabel: staffLabel, sessionId: staffSessionId, page: 'giveawayscanner' })
      .then(function(res) {
        if (!res || res.status === 'notfound') { flash('#c62828', '✗ Not Found'); showOverlay('Not Found', 'err'); statusEl.textContent = (serial||'Ticket') + ' — Not found'; }
        else if (res.status === 'found') {
          if (res.giveaway === 'No') { flash('#2e7d32', '✓ Granted'); showOverlay('Giveaway Granted ✓', 'ok'); statusEl.textContent = 'Giveaway granted'; }
          else { flash('#c62828', '✗ Claimed'); showOverlay('Already Claimed', 'err'); statusEl.textContent = 'Already claimed'; }
        } else { flash('#c62828', 'Error'); statusEl.textContent = 'Error'; }
        resume();
      })
      .catch(function() { flash('#c62828', 'Error'); statusEl.textContent = 'Connection error'; resume(); });
  }

  function startSessionPoll() {
    if (_sessionPoll) clearInterval(_sessionPoll);
    _sessionPoll = setInterval(function() {
      if (!staffSessionId || !staffLabel) return;
      api('checkSession', { name: staffLabel, sessionId: staffSessionId })
        .then(function(r) {
          if (r && !r.valid) { clearInterval(_sessionPoll); _sessionPoll = null; doLogout(); loginMsg.textContent = 'Logged out — session started on another page.'; loginMsg.style.color = '#f0ad4e'; }
        }).catch(function(){});
    }, 15000);
  }

  logoutBtn.addEventListener('click', function() {
    api('logout', { sessionId: staffSessionId, name: staffLabel }).catch(function(){});
    doLogout();
  });

  function doLogout() {
    if (_sessionPoll) { clearInterval(_sessionPoll); _sessionPoll = null; }
    staffSessionId = null; staffLabel = ''; isAdmin = false;
    staffLblEl.textContent = ''; adminBadge.style.display = 'none';
    stopCamera();
    document.getElementById('scannerBox').style.display = 'none';
    document.getElementById('loginBox').style.display = 'block';
    statusEl.textContent = 'Logged out'; loginMsg.style.color = ''; diag.style.display = 'none';
  }

  window.addEventListener('pagehide', function() {
    try { if (staffSessionId && staffLabel) api('logout', { sessionId: staffSessionId, name: staffLabel }); } catch(e){}
  });
</script>
</body>
</html>
